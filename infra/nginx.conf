# NexusAI — Nginx reverse proxy configuration
#
# Serves two upstream services:
#   /api/*       → FastAPI backend   (port 8000)
#   /            → React frontend    (port 3000 in dev, 80 in prod container)
#
# In production, replace server_name _ with the actual domain.
# TLS termination should be handled by Certbot or a cloud load balancer.

upstream nexusai_api {
    server api:8000;
    keepalive 16;
}

upstream nexusai_frontend {
    server frontend:80;
    keepalive 8;
}

server {
    listen 80;
    server_name _;

    # ── API proxy ──────────────────────────────────────────────────────────────
    location /api/ {
        proxy_pass         http://nexusai_api;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";

        # Long timeout for semantic embedding on first cache miss
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    # ── FastAPI docs (passthrough) ─────────────────────────────────────────────
    location ~ ^/(docs|redoc|openapi.json) {
        proxy_pass         http://nexusai_api;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
    }

    # ── Health check (used by docker compose healthcheck) ─────────────────────
    location /health {
        proxy_pass         http://nexusai_api/health;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
    }

    # ── React SPA (catch-all) ──────────────────────────────────────────────────
    location / {
        proxy_pass         http://nexusai_frontend;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";

        # SPA routing — serve index.html for all non-file paths
        proxy_intercept_errors on;
        error_page 404 /;
    }

    # ── Security headers ───────────────────────────────────────────────────────
    add_header X-Frame-Options        "SAMEORIGIN"    always;
    add_header X-Content-Type-Options "nosniff"       always;
    add_header Referrer-Policy        "same-origin"   always;

    # ── Gzip ──────────────────────────────────────────────────────────────────
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;
    gzip_min_length 1024;
}
